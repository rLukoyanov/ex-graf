apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: influx
  labels:
    app: influx-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influx-app
  template:
    metadata:
      labels:
        app: influx-app
    spec:
      containers:
        - name: app
          image: influx-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: app-config
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
